name: crash_guard
description: AI-powered offline crash detection and emergency dispatch
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── ML & Sensors ──────────────────────────────────────
  tflite_flutter: ^0.12.1       # on-device ML inference
  sensors_plus: ^4.0.2          # accelerometer + gyroscope
  geolocator: ^11.0.0           # GPS location

  # ── State management ──────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Local storage (replaces backend DB) ───────────────
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # ── Background service ────────────────────────────────
  flutter_background_service: ^5.0.5

  # ── Emergency dispatch (replaces backend calls) ───────
  url_launcher: ^6.3.0          # dials emergency number directly
  vibration: ^1.8.4
  audioplayers: ^6.0.0

  # ── Navigation & utilities ────────────────────────────
  go_router: ^13.2.0
  uuid: ^4.4.0
  permission_handler: ^11.3.1
  flutter_contacts: ^1.1.9
  wakelock_plus: ^1.1.4
  image_picker: ^1.1.2
  noise_meter: ^5.0.2
  share_plus: ^10.1.0
  flutter_local_notifications: ^17.2.1+2
  path_provider: ^2.1.3
  timezone: ^0.9.4
  intl: ^0.19.0
  flutter_phone_direct_caller: ^2.2.1
  shared_preferences: ^2.5.5

  # ── NEW: Location-based nearby services ──────────────
  http: ^1.2.0                  # OSM Overpass API HTTP calls
  flutter_map: ^6.1.0           # Interactive map (OpenStreetMap tiles)
  latlong2: ^0.9.0              # LatLng type required by flutter_map

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/crash_model.tflite
    - assets/sounds/alert.mp3
